<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulk Search</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Bulk Search</h1>
        <p id="accountLine">Loading account...</p>
      </div>
      <button id="refreshBtn" type="button">Refresh</button>
    </header>

    <section class="upload">
      <div>
        <h2>Upload usernames</h2>
        <p>TXT/CSV, one @username per line. The bot keeps normal single search; this page is only for bulk.</p>
      </div>
      <form id="uploadForm">
        <input id="fileInput" name="file" type="file" accept=".txt,.csv" required>
        <button type="submit">Start Bulk</button>
      </form>
      <div id="uploadStatus" class="status"></div>
    </section>

    <section class="layout">
      <aside class="jobs">
        <div class="sectionHead">
          <h2>Jobs</h2>
        </div>
        <div id="jobsList" class="jobsList"></div>
      </aside>

      <section class="results">
        <div class="sectionHead">
          <div>
            <h2 id="jobTitle">Select a job</h2>
            <p id="jobMeta"></p>
          </div>
          <a id="exportLink" class="button ghost disabled" href="#">Export CSV</a>
        </div>

        <div class="progressWrap">
          <div id="progressBar" class="progressBar"></div>
        </div>

        <div class="filters">
          <label class="check">
            <input id="onlyFound" type="checkbox">
            <span>Only found</span>
          </label>
          <input id="searchInput" type="search" placeholder="Search username or wallet">
          <button id="prevPage" type="button">Prev</button>
          <button id="nextPage" type="button">Next</button>
        </div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Status</th>
                <th>Wallets</th>
                <th>Platforms</th>
                <th>Balance</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody id="itemsBody">
              <tr><td colspan="6" class="empty">No job selected</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
